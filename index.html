<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Stellify – AI Career Copilot Schweiz. Bewerbungen, LinkedIn, ATS-Check und 20+ KI-Tools."/>
  <meta name="theme-color" content="#10b981"/>
  <title>Stellify – AI Career Copilot Schweiz</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
  <meta property="og:title" content="Stellify – AI Career Copilot Schweiz"/>
  <meta property="og:description" content="Bewerbungen schreiben, LinkedIn optimieren, ATS-Check und 20+ KI-Tools."/>
  <style>
    *{box-sizing:border-box}
    body{margin:0;padding:0;background:#07070e}
    #root{min-height:100vh}
    #loading{position:fixed;inset:0;background:#07070e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:99999;transition:opacity .5s}
    #loading .logo{font-size:52px;animation:lp 1.8s ease-in-out infinite}
    #loading .dots{display:flex;gap:8px}
    #loading .dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:ld 1.2s ease-in-out infinite}
    #loading .dot:nth-child(2){animation-delay:.2s}
    #loading .dot:nth-child(3){animation-delay:.4s}
    #loading .name{color:white;font-size:22px;font-weight:700;font-family:system-ui;letter-spacing:-0.5px}
    #loading .sub{color:rgba(255,255,255,.35);font-size:12px;font-family:system-ui}
    @keyframes lp{0%,100%{opacity:.5;transform:scale(.88)}50%{opacity:1;transform:scale(1.06)}}
    @keyframes ld{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">✦</div>
    <div class="name">Stellify</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="sub">AI Career Copilot Schweiz</div>
  </div>
  <div id="root"></div>
  <!-- Alles in einer Datei – kein CDN, kein Babel -->
  <script src="./stellify-bundle.js"></script>
</body>
</html>
